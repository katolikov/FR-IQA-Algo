<?xml version="1.0" encoding="UTF-8"?>
<!-- UPIQAL favicon — earthy palette (Weathered Timber tile, Faded Brick accent). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="r">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14"/>
    </clipPath>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4a3d33"/>
      <stop offset="100%" stop-color="#3E3129"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#r)">
    <!-- Tile: Weathered Timber gradient -->
    <rect width="64" height="64" fill="url(#tile)"/>

    <!-- Faded Brick bottom sash — the defining accent -->
    <rect x="0" y="50" width="64" height="14" fill="#7A3731"/>

    <!-- "U" glyph — warm off-white, thicker stroke -->
    <path d="M 18 16 V 36 Q 18 46 32 46 Q 46 46 46 36 V 16"
          fill="none" stroke="#ede6d9" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Artifact locator pin — Oxidized Iron circle -->
    <circle cx="50" cy="16" r="4" fill="#5E3A23" stroke="#ede6d9" stroke-width="1.5"/>
  </g>
</svg>
