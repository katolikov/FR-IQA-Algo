# Fly.io deployment for the UPIQAL FastAPI inference backend.
#
# After editing, deploy with:
#     fly launch --copy-config --name upiqal --no-deploy   # first time only
#     fly deploy
#
# Then set the resulting URL (e.g. https://upiqal.fly.dev) as BACKEND_URL in
# the Vercel project settings so /api/* proxies to it.

app = "upiqal"
primary_region = "iad"   # change to the region nearest your users

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # Restrict CORS to your Vercel origin in production.
  UPIQAL_ALLOWED_ORIGINS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "30s"
    method = "GET"
    path   = "/healthz"

# VGG16 + UPIQAL needs generous memory for CPU inference on realistic images.
# Scale up if you see OOMs on large uploads.
[[vm]]
  size = "shared-cpu-2x"
  memory_mb = 2048
